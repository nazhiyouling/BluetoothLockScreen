name: Build on Release

on:
  release:
    types: [published]

env:
  SOLUTION_FILE: BluetoothLockScreen.sln
  BUILD_PLATFORM: x64
  DOTNET_VERSION: 8.0.x
  BASE_EXE_NAME: BluetoothLockScreen

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Debug - Show Resources folder content
      shell: pwsh
      run: |
        Write-Host "=== Repository root ==="
        Get-ChildItem -Name
        if (Test-Path "Resources") {
            Write-Host "=== Resources folder content ==="
            Get-ChildItem -Path Resources -Recurse | ForEach-Object { $_.FullName }
        } else {
            Write-Host "Resources folder does NOT exist."
        }

    - name: Fix icon files (case-insensitive match, fallback placeholder)
      shell: pwsh
      run: |
        if (-not (Test-Path "Resources")) { New-Item -ItemType Directory -Path "Resources" }
        function Get-MatchingFile { param([string]$Folder, [string]$Pattern) Get-ChildItem -Path $Folder -Name "*" | Where-Object { $_ -like $Pattern } | Select-Object -First 1 }
        $icoFile = Get-MatchingFile "Resources" "*.ico"
        $pngFile = Get-MatchingFile "Resources" "*.png"
        if ($icoFile -and $icoFile -ne "app.ico") { Copy-Item "Resources\$icoFile" "Resources\app.ico" -Force }
        if ($pngFile -and $pngFile -ne "app.png") { Copy-Item "Resources\$pngFile" "Resources\app.png" -Force }
        if (-not (Test-Path "Resources\app.ico")) {
            Write-Host "Generating placeholder app.ico"
            $icoBytes = [System.Convert]::FromBase64String("")
            [System.IO.File]::WriteAllBytes("Resources\app.ico", $icoBytes)
        }
        if (-not (Test-Path "Resources\app.png")) {
            Write-Host "Generating placeholder app.png"
            $pngBytes = [System.Convert]::FromBase64String("iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==")
            [System.IO.File]::WriteAllBytes("Resources\app.png", $pngBytes)
        }

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_FILE }}

    - name: Build solution
      run: dotnet build ${{ env.SOLUTION_FILE }} -c Release /p:Platform=${{ env.BUILD_PLATFORM }} --no-restore

    - name: Publish (self-contained single file)
      shell: pwsh
      run: |
        $rawTag = "${{ github.event.release.tag_name }}"
        $cleanVersion = $rawTag -replace '^[vV]', ''
        Write-Host "Clean version: $cleanVersion"
        dotnet publish ${{ env.SOLUTION_FILE }} -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:Version=$cleanVersion -o publish

    - name: Copy Resources folder to publish output
      shell: pwsh
      run: |
        if (Test-Path "Resources") {
            Copy-Item -Path "Resources" -Destination "publish\Resources" -Recurse -Force
            Write-Host "Resources folder copied to publish"
        } else {
            Write-Host "Resources folder not found, skipping copy"
        }

    - name: Rename exe with release version
      shell: pwsh
      run: |
        $baseName = "$env:BASE_EXE_NAME"
        $tag = "${{ github.event.release.tag_name }}"
        $exeName = "${baseName}-${tag}.exe"
        $exe = Get-ChildItem -Path publish -Filter *.exe | Select-Object -First 1
        if ($exe) {
            $newPath = Join-Path publish $exeName
            Write-Host "Renaming '$($exe.Name)' to '$exeName'"
            Move-Item -Path $exe.FullName -Destination $newPath -Force
        } else {
            Write-Host "No exe file found in publish directory!"
            exit 1
        }

    # 使用 GitHub CLI 上传 Release Assets（更可靠）
    - name: Upload to Release using gh CLI
      shell: pwsh
      run: |
        $file = "publish/$env:BASE_EXE_NAME-${{ github.event.release.tag_name }}.exe"
        gh release upload ${{ github.event.release.tag_name }} $file --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 备份 Artifact（可选）
    - name: Upload artifacts (backup)
      uses: actions/upload-artifact@v4
      with:
        name: BluetoothLockScreen-Release
        path: publish/
